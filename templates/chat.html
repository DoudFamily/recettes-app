<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
</head>
<body>
    <h2>💬 Choisir un utilisateur</h2>

    {% if users %}
        <ul>
        {% for user in users %}
            <li>
                <a href="/chat/{{ user }}">💬 {{ user }}</a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>Aucun autre utilisateur disponible.</p>
    {% endif %}

    <br>
    <a href="/">← Retour</a>
</body>
</html>
